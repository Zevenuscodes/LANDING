<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Loading…</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;900&family=Montserrat:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a2e0a;
      font-family: 'Noto Sans Devanagari', 'Montserrat', sans-serif;
      overflow-x: hidden;
      padding-bottom: 100px;
    }

    /* ── ANIMATED BG ── */
    .bg-anim {
      position: fixed; inset: 0; z-index: -2;
      background: linear-gradient(160deg, #0d1f05 0%, #1a3408 45%, #0f1f00 100%);
    }
    .bg-anim::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 20%, rgba(180,140,40,0.12) 0%, transparent 65%);
      animation: gb 5s ease-in-out infinite alternate;
    }
    @keyframes gb { from { opacity:.3; } to { opacity:1; } }

    /* ── FLOATING LEAVES ── */
    .leaf {
      position: fixed; font-size: 20px; opacity: 0;
      animation: leaf-fall linear infinite;
      pointer-events: none; z-index: 0;
    }
    @keyframes leaf-fall {
      0%   { transform: translateY(-40px) rotate(0deg);   opacity: 0; }
      10%  { opacity: .6; }
      90%  { opacity: .3; }
      100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
    }

    /* ── STICKY BAR ── */
    .sticky-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: #0d1f05;
      border-top: 3px solid #d4a017;
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 -6px 30px rgba(212,160,23,.4);
      animation: sticky-appear .4s ease-out;
    }
    @keyframes sticky-appear { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sticky-arrow {
      color: #d4a017; font-size: 24px;
      text-shadow: 0 0 10px rgba(212,160,23,.9);
      animation: arr-blink .6s ease-in-out infinite alternate;
    }
    @keyframes arr-blink {
      from{opacity:.3;transform:translateX(0)} to{opacity:1;transform:translateX(-5px)}
    }
    .sticky-arrow.r { animation-name: arr-blink-r; }
    @keyframes arr-blink-r {
      from{opacity:.3;transform:translateX(0)} to{opacity:1;transform:translateX(5px)}
    }
    .sticky-btn {
      flex: 1; max-width: 380px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, #c8860a 0%, #f0aa20 50%, #c8860a 100%);
      color: #1a1000;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(16px, 4.5vw, 21px);
      font-weight: 900;
      text-decoration: none;
      padding: 14px 20px; border-radius: 12px;
      text-transform: uppercase; letter-spacing: .5px;
      box-shadow: 0 4px 20px rgba(212,160,23,.6);
      animation: sticky-pulse 1s ease-in-out infinite;
      overflow: hidden; position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    @keyframes sticky-pulse {
      0%,100%{box-shadow:0 4px 20px rgba(212,160,23,.6);transform:scale(1)}
      50%     {box-shadow:0 6px 35px rgba(212,160,23,.9);transform:scale(1.03)}
    }
    .sticky-btn::before {
      content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
      animation:shimmer 1.8s ease-in-out infinite;
    }
    @keyframes shimmer{0%{left:-100%}100%{left:200%}}

    /* ── PAGE WRAPPER ── */
    .page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 14px 50px;
    }

    /* ── TOP BADGE ── */
    .top-badge {
      background: linear-gradient(90deg, #1e5c0e, #2d8a1a, #1e5c0e);
      color: #f5d76e;
      font-size: clamp(13px, 3.5vw, 16px); font-weight: 700;
      padding: 10px 22px; border-radius: 30px; margin-bottom: 6px;
      border: 2px solid #f5d76e;
      box-shadow: 0 0 25px rgba(45,138,26,.7);
      animation: badge-pulse 2s ease-in-out infinite;
      text-align: center;
    }
    @keyframes badge-pulse {
      0%,100%{box-shadow:0 0 25px rgba(45,138,26,.7)}
      50%    {box-shadow:0 0 50px rgba(45,138,26,1)}
    }

    /* ── POSTER ── */
    .poster-wrap {
      width: 100%; max-width: 500px; border-radius: 18px;
      overflow: hidden; border: 4px solid #d4a017;
      box-shadow: 0 0 40px rgba(212,160,23,.5), 0 0 80px rgba(212,160,23,.2);
      margin-bottom: 22px; animation: poster-glow 2.5s ease-in-out infinite;
      position: relative;
    }
    @keyframes poster-glow {
      0%,100%{box-shadow:0 0 40px rgba(212,160,23,.5),0 0 80px rgba(212,160,23,.2)}
      50%    {box-shadow:0 0 65px rgba(212,160,23,.8),0 0 120px rgba(212,160,23,.35)}
    }
    .poster-wrap img { width:100%; display:block; }
    .poster-ribbon {
      position:absolute; top:14px; right:-8px;
      background:#1a5c0a; color:#f5d76e;
      font-size:12px; font-weight:900;
      padding:6px 18px 6px 12px; border-radius:4px 0 0 4px;
      box-shadow:0 2px 8px rgba(0,0,0,.5);
      animation:flicker 1.5s infinite; letter-spacing:.5px;
      border:1px solid #d4a017;
    }
    @keyframes flicker{0%,94%,100%{opacity:1}95%{opacity:.3}97%{opacity:1}98%{opacity:.2}}

    /* ── HERO HEADLINE ── */
    .hero {
      text-align: center; width:100%; max-width:500px; margin-bottom:18px;
    }
    .hero .pre-line {
      font-size: clamp(13px,3.8vw,16px); color:#aed88a; font-weight:700;
      margin-bottom:6px; letter-spacing:.3px;
    }
    .hero h1 {
      font-size: clamp(28px, 8.5vw, 50px); font-weight:900; line-height:1.2;
      color:#f5d76e;
      text-shadow: 2px 2px 0 #1a5c0a, 0 0 30px rgba(212,160,23,.5);
      -webkit-text-stroke: 1px #c8860a;
      animation: headline-shine 3s ease-in-out infinite;
    }
    @keyframes headline-shine {
      0%,100%{text-shadow:2px 2px 0 #1a5c0a,0 0 30px rgba(212,160,23,.5)}
      50%    {text-shadow:2px 2px 0 #1a5c0a,0 0 60px rgba(212,160,23,.9),0 0 100px rgba(212,160,23,.3)}
    }
    .hero h1 .green { color:#5ddb4a; -webkit-text-stroke:1px #2d8a1a; }
    .hero .sub {
      font-size:clamp(18px,5vw,24px); color:#e8e8e8; font-weight:700; margin-top:6px;
    }

    /* ── STATS ROW ── */
    .stats-row {
      display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
      width:100%; max-width:500px; margin-bottom:18px;
    }
    .stat-chip {
      background:rgba(212,160,23,.12); border:2px solid rgba(212,160,23,.5);
      border-radius:14px; padding:14px 16px; flex:1; min-width:130px;
      text-align:center;
    }
    .stat-chip .s-num {
      font-size:clamp(26px,7vw,36px); font-weight:900; color:#f5d76e;
      font-family:'Montserrat',sans-serif; line-height:1;
      text-shadow:0 0 20px rgba(212,160,23,.7);
    }
    .stat-chip .s-label {
      font-size:clamp(11px,3vw,13px); color:#bbd9a0; font-weight:600;
      line-height:1.4; margin-top:4px;
    }
    .stat-wide {
      background:rgba(45,138,26,.2); border:1px solid rgba(45,138,26,.6);
      border-radius:14px; padding:14px 18px;
      width:100%; max-width:500px; text-align:center;
      font-size:clamp(14px,4vw,17px); color:#ddf0cc; font-weight:700;
      margin-bottom:18px;
    }
    .stat-wide .highlight { color:#f5d76e; }

    /* ── SECTION DIVIDER STRIP ── */
    .strip {
      background:linear-gradient(135deg,#1e5c0e,#2d8a1a,#1e5c0e);
      border:2px solid #f5d76e; border-radius:12px;
      padding:14px 20px; text-align:center;
      width:100%; max-width:500px; margin-bottom:18px;
      font-size:clamp(15px,4.2vw,19px); font-weight:900; color:#f5d76e;
      text-shadow:0 0 15px rgba(212,160,23,.6);
      box-shadow:0 0 25px rgba(45,138,26,.5);
    }

    /* ── COURSE FEATURES GRID ── */
    .features-grid {
      display:grid; grid-template-columns:1fr 1fr 1fr;
      gap:10px; width:100%; max-width:500px; margin-bottom:22px;
    }
    @media(max-width:360px){ .features-grid{grid-template-columns:1fr 1fr;} }
    .feat-box {
      background:rgba(255,255,255,.06); border:1px solid rgba(212,160,23,.3);
      border-radius:14px; padding:14px 10px; text-align:center;
    }
    .feat-box .f-num {
      font-size:clamp(20px,5.5vw,28px); font-weight:900; color:#f5d76e;
      font-family:'Montserrat',sans-serif; line-height:1;
    }
    .feat-box .f-icon { font-size:26px; display:block; margin-bottom:6px; }
    .feat-box .f-text {
      font-size:clamp(11px,2.8vw,13px); color:#c8ddb0; font-weight:600; line-height:1.4; margin-top:4px;
    }

    /* ── MOTIVATIONAL STRIP ── */
    .moti-strip {
      background:linear-gradient(90deg,#0d2e05,#1a5c0a,#0d2e05);
      background-size:200% 100%;
      animation:moti-scroll 4s linear infinite;
      border:2px solid #d4a017; border-radius:14px;
      padding:18px 20px; text-align:center;
      width:100%; max-width:500px; margin-bottom:22px;
    }
    @keyframes moti-scroll{0%{background-position:0%}100%{background-position:200%}}
    .moti-strip .m-top {
      font-size:clamp(14px,4vw,17px); color:#c8ddb0; font-weight:700; margin-bottom:4px;
    }
    .moti-strip .m-hero {
      font-size:clamp(20px,5.5vw,26px); font-weight:900; color:#f5d76e;
      text-shadow:0 0 20px rgba(212,160,23,.7);
    }

    /* ── THREE-COLUMN INFO SECTION ── */
    .info-grid {
      display:grid; grid-template-columns:1fr;
      gap:12px; width:100%; max-width:500px; margin-bottom:20px;
    }
    .info-card {
      background:rgba(255,255,255,.05); border:1px solid rgba(212,160,23,.25);
      border-radius:16px; padding:18px 16px;
    }
    .info-card .ic-title {
      font-size:clamp(14px,4vw,17px); font-weight:900; color:#f5d76e;
      margin-bottom:12px; text-align:center;
      border-bottom:1px solid rgba(212,160,23,.3); padding-bottom:10px;
    }
    .info-item {
      display:flex; align-items:flex-start; gap:10px;
      font-size:clamp(13px,3.6vw,15px); color:#cce8b0; font-weight:600;
      line-height:1.5; padding:6px 0;
      border-bottom:1px solid rgba(255,255,255,.05);
    }
    .info-item:last-child{border-bottom:none;}
    .info-check{color:#5ddb4a;font-size:16px;flex-shrink:0;margin-top:2px;}
    .info-gift {color:#f5d76e;font-size:16px;flex-shrink:0;margin-top:2px;}

    /* ── STUDENTS COUNT ── */
    .students-box {
      text-align:center; padding:10px 0;
    }
    .students-box .stu-num {
      font-size:clamp(38px,10vw,52px); font-weight:900; color:#f5d76e;
      font-family:'Montserrat',sans-serif;
      text-shadow:0 0 25px rgba(212,160,23,.8);
      animation:clock-glow 1s ease-in-out infinite alternate;
    }
    @keyframes clock-glow {
      from{text-shadow:0 0 20px rgba(212,160,23,.7)}
      to  {text-shadow:0 0 50px rgba(212,160,23,1),0 0 80px rgba(212,160,23,.4)}
    }
    .students-box .stu-sub {
      font-size:clamp(14px,4vw,17px); color:#bbd9a0; font-weight:700; margin-top:4px;
    }

    /* ── CTA / URGENCY SECTION ── */
    .cta-section {
      width:100%; max-width:500px; margin-bottom:20px;
    }
    .urgency-bar {
      background:linear-gradient(90deg,#8b0000,#cc2200,#8b0000);
      background-size:200% 100%;
      animation:urg 2s linear infinite;
      color:#fff; font-weight:900;
      font-size:clamp(13px,3.8vw,16px);
      padding:12px 18px; border-radius:12px 12px 0 0;
      text-align:center; letter-spacing:.5px;
    }
    @keyframes urg{0%{background-position:0%}100%{background-position:200%}}
    .cta-box {
      background:rgba(212,160,23,.08); border:2px solid #d4a017;
      border-top:none; border-radius:0 0 12px 12px;
      padding:18px 16px; text-align:center;
    }
    .next-batch {
      font-size:clamp(13px,3.8vw,16px); color:#aed88a; font-weight:700;
      margin-top:10px;
    }

    /* ── ARROWS ── */
    .arrow-section {
      display:flex; flex-direction:column; align-items:center; margin-bottom:8px;
    }
    .arrow-row{display:flex;gap:8px;margin-bottom:2px;}
    .arrow {
      color:#d4a017; font-size:34px;
      text-shadow:0 0 15px rgba(212,160,23,.8);
      animation:bounce-d .6s ease-in-out infinite alternate;
    }
    .arrow:nth-child(2){animation-delay:.1s}
    .arrow:nth-child(3){animation-delay:.2s}
    @keyframes bounce-d {
      from{transform:translateY(-6px);opacity:.5}
      to  {transform:translateY(6px); opacity:1}
    }

    /* ── JOIN / APPLY BUTTON ── */
    .join-wrap {
      position:relative; margin-bottom:12px;
      display:flex; align-items:center; gap:10px;
    }
    .join-wrap::before,.join-wrap::after {
      content:''; position:absolute; inset:-5px; border-radius:18px;
      background:linear-gradient(45deg,#d4a017,#f5d76e,#d4a017,#c8860a);
      background-size:300% 300%;
      animation:spin-border 2s linear infinite; z-index:-1;
    }
    .join-wrap::after{filter:blur(14px);opacity:.7;}
    @keyframes spin-border{0%{background-position:0% 50%}100%{background-position:200% 50%}}
    .side-arr{color:#d4a017;font-size:28px;text-shadow:0 0 12px rgba(212,160,23,.8);}
    .side-arr.l{animation:arr-l .7s ease-in-out infinite alternate;}
    .side-arr.r{animation:arr-r .7s ease-in-out infinite alternate;}
    @keyframes arr-l{from{opacity:.3;transform:translateX(0)}to{opacity:1;transform:translateX(-5px)}}
    @keyframes arr-r{from{opacity:.3;transform:translateX(0)}to{opacity:1;transform:translateX(5px)}}

    .apply-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      background:linear-gradient(135deg,#c8860a 0%,#f0aa20 50%,#c8860a 100%);
      color:#1a1000;
      font-family:'Montserrat','Noto Sans Devanagari',sans-serif;
      font-size:clamp(20px,5.5vw,28px);
      font-weight:900; text-decoration:none;
      padding:18px 36px; border-radius:14px;
      text-transform:uppercase; letter-spacing:1px;
      box-shadow:0 8px 30px rgba(212,160,23,.6);
      animation:btn-pulse 1.1s ease-in-out infinite;
      overflow:hidden; position:relative;
      min-width:240px; text-align:center;
      -webkit-tap-highlight-color:transparent;
    }
    @keyframes btn-pulse {
      0%,100%{transform:scale(1);   box-shadow:0 8px 30px rgba(212,160,23,.6)}
      50%    {transform:scale(1.05);box-shadow:0 12px 50px rgba(212,160,23,.9)}
    }
    .apply-btn::before {
      content:''; position:absolute; top:0; left:-100%;
      width:60%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
      animation:shimmer 2s ease-in-out infinite;
    }
    .apply-btn:active{transform:scale(.96);}

    /* ── TRUST BADGES ── */
    .trust-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:10px; width:100%; max-width:500px; margin-bottom:20px;
    }
    .trust-box {
      background:rgba(255,255,255,.04); border:1px solid rgba(212,160,23,.25);
      border-radius:12px; padding:14px 12px; text-align:center;
    }
    .trust-box .t-icon{font-size:26px;display:block;margin-bottom:6px;}
    .trust-box .t-text{
      font-size:clamp(11px,3vw,13px); color:#bbd9a0; font-weight:600; line-height:1.4;
    }

    /* ── FOOTER ── */
    .footer {
      color:#4a6640; font-size:12px;
      text-align:center; max-width:420px; line-height:1.6;
    }

    /* ── CARD generic ── */
    .card {
      background:rgba(255,255,255,.05); border:1px solid rgba(212,160,23,.3);
      border-radius:16px; padding:20px 18px;
      width:100%; max-width:500px; margin-bottom:18px;
    }
    .card-title {
      font-size:clamp(16px,4.5vw,20px); font-weight:900; color:#f5d76e;
      text-align:center; margin-bottom:14px;
      text-shadow:0 0 12px rgba(212,160,23,.5);
    }
  </style>
</head>

  nextBatch: "📅 अगला बैच जल्द शुरू हो रहा है!",

  /* ── Trust badges (2×2 grid) ── */
  trustBadges: [
    { icon: "🛡️", text: "100% प्रायोगिक और व्यावहारिक ज्ञान" },
    { icon: "👨‍⚕️", text: "अनुभवी आयुर्वेद विशेषज्ञों की टीम" },
    { icon: "📜", text: "प्राचीन ज्ञान आधुनिक रिसर्च के साथ" },
    { icon: "⭐", text: "आपका विश्वास हमारी सबसे बड़ी प्राथमिकता" },
  ],

  /* ── Button hint ── */
  btnHint: "👆 बटन दबाएं और अभी जुड़ें!",

  /* ── Footer ── */
  footerLine1: "WhatsApp Community से जुड़ने पर आप WhatsApp की शर्तों से सहमत होते हैं।",
  footerLine2: "यह कोर्स पूरी तरह निःशुल्क है। आप कभी भी छोड़ सकते हैं।",

};
/* ═══════════════════════════════════════════════════════════════════════════
   ⛔  DO NOT EDIT BELOW THIS LINE — नीचे कुछ न बदलें
   ═══════════════════════════════════════════════════════════════════════════ */
</script>

<script>
  /* Floating leaves */
  var leafDefs = [
    {l:'4%', d:'11s', delay:'0s',   e:'🌿'},{l:'16%',d:'14s',delay:'2s',  e:'🍃'},
    {l:'30%',d:'9s',  delay:'1s',   e:'🌱'},{l:'50%',d:'13s',delay:'3.5s',e:'🌿'},
    {l:'65%',d:'10s', delay:'0.7s', e:'🍃'},{l:'80%',d:'8s', delay:'2s',  e:'🌱'},
    {l:'93%',d:'15s', delay:'4s',   e:'🌿'},
  ];
  leafDefs.forEach(function(lp){
    var el=document.createElement('div');
    el.className='leaf';
    el.style.cssText='left:'+lp.l+';animation-duration:'+lp.d+';animation-delay:'+lp.delay+';';
    el.textContent=lp.e;
    document.body.appendChild(el);
  });

  function applyLink(text, extraStyle) {
    return '<a class="apply-btn" href="'+CONFIG.whatsappLink+'" target="_blank" rel="noopener noreferrer"'
      +(extraStyle?' style="'+extraStyle+'"':'')+'>'+text+'</a>';
  }

  function joinWrap(btnText, wrapStyle) {
    return '<div class="join-wrap"'+(wrapStyle?' style="'+wrapStyle+'"':'')+'>'
      +'<span class="side-arr l">&#9658;&#9658;</span>'
      +applyLink(btnText)
      +'<span class="side-arr r">&#9668;&#9668;</span>'
      +'</div>';
  }

  function arrowsDown() {
    return '<div class="arrow-section">'
      +'<div class="arrow-row">'
      +'<span class="arrow">&#9660;</span>'
      +'<span class="arrow">&#9660;</span>'
      +'<span class="arrow">&#9660;</span>'
      +'</div>'
      +'<div class="arrow-row">'
      +'<span class="arrow" style="font-size:44px">&#9660;</span>'
      +'<span class="arrow" style="font-size:44px;animation-delay:.15s">&#9660;</span>'
      +'</div></div>';
  }

  var statsHTML = CONFIG.stats.map(function(s){
    return '<div class="stat-chip">'
      +'<div class="s-num">'+s.num+'</div>'
      +'<div class="s-label">'+s.label.replace('\n','<br>')+'</div>'
      +'</div>';
  }).join('');

  var featuresHTML = CONFIG.courseFeatures.map(function(f){
    return '<div class="feat-box">'
      +'<span class="f-icon">'+f.icon+'</span>'
      +(f.num ? '<div class="f-num">'+f.num+'</div>' : '')
      +'<div class="f-text">'+f.text+'</div>'
      +'</div>';
  }).join('');

  var whoHTML = CONFIG.whoItems.map(function(item){
    return '<div class="info-item"><span class="info-check">✅</span><span>'+item+'</span></div>';
  }).join('');

  var bonusHTML = CONFIG.bonusItems.map(function(item){
    return '<div class="info-item"><span class="info-gift">🎁</span><span>'+item+'</span></div>';
  }).join('');

  var trustHTML = CONFIG.trustBadges.map(function(b){
    return '<div class="trust-box">'
      +'<span class="t-icon">'+b.icon+'</span>'
      +'<span class="t-text">'+b.text+'</span>'
      +'</div>';
  }).join('');

  document.title = CONFIG.pageTitle;

  document.getElementById('page-root').innerHTML =

    /* top badge */
    '<div class="top-badge">'+CONFIG.topBadge+'</div>'

    /* first CTA — immediately visible */
    + '<div class="arrow-section" style="margin-bottom:6px">'
    + '<div class="arrow-row">'
    + '<span class="arrow">&#9660;</span>'
    + '<span class="arrow">&#9660;</span>'
    + '<span class="arrow">&#9660;</span>'
    + '</div></div>'
    + joinWrap(CONFIG.applyBtnText, 'margin-bottom:18px')

    /* poster */
    + '<div class="poster-wrap">'
    + '<img src="'+CONFIG.posterImage+'" alt="Ayurveda Course" onerror="this.parentElement.style.display=\'none\'" />'
    + '<div class="poster-ribbon">'+CONFIG.posterRibbon+'</div>'
    + '</div>'

    /* hero headline */
    + '<div class="hero">'
    + '<div class="pre-line">'+CONFIG.heroPreLine+'</div>'
    + '<h1><span class="green">'+CONFIG.heroMainGreen+'</span></h1>'
    + '<div class="sub">'+CONFIG.heroSub+'</div>'
    + '</div>'

    /* stats */
    + '<div class="stats-row">'+statsHTML+'</div>'
    + '<div class="stat-wide">'+CONFIG.statWide+'</div>'

    /* course features */
    + '<div class="strip">'+CONFIG.courseSectionTitle+'</div>'
    + '<div class="features-grid">'+featuresHTML+'</div>'

    /* motivational strip */
    + '<div class="moti-strip">'
    + '<div class="m-top">'+CONFIG.motiTop+'</div>'
    + '<div class="m-hero">'+CONFIG.motiHero+'</div>'
    + '</div>'

    /* arrows + second CTA */
    + arrowsDown()
    + joinWrap(CONFIG.applyBtnText)
    + '<p style="color:#888;font-size:13px;text-align:center;margin-bottom:24px;">'+CONFIG.btnHint+'</p>'

    /* info cards */
    + '<div class="card">'
    + '<div class="card-title">✅ '+CONFIG.whoTitle+'</div>'
    + whoHTML
    + '</div>'

    + '<div class="card" style="text-align:center;">'
    + '<div class="card-title">👥 हमारे साथ जुड़ चुके हैं</div>'
    + '<div class="students-box">'
    + '<div class="stu-num">'+CONFIG.studentsNum+'</div>'
    + '<div class="stu-sub">'+CONFIG.studentsSub+'</div>'
    + '</div>'
    + '</div>'

    + '<div class="card">'
    + '<div class="card-title">'+CONFIG.bonusTitle+'</div>'
    + bonusHTML
    + '</div>'

    /* CTA urgency block */
    + '<div class="cta-section">'
    + '<div class="urgency-bar">'+CONFIG.urgencyText+'</div>'
    + '<div class="cta-box">'
    + joinWrap(CONFIG.applyBtnText)
    + '<div class="next-batch">'+CONFIG.nextBatch+'</div>'
    + '</div>'
    + '</div>'

    /* trust badges */
    + '<div class="trust-grid">'+trustHTML+'</div>'

    /* footer */
    + '<div class="footer">'+CONFIG.footerLine1+'<br>'+CONFIG.footerLine2+'</div>';

  /* sticky bar */
  document.getElementById('sticky-bar').innerHTML =
    '<span class="sticky-arrow">&#9658;&#9658;</span>'
    +'<a class="sticky-btn" href="'+CONFIG.whatsappLink+'" target="_blank" rel="noopener noreferrer">'
    +CONFIG.applyBtnText
    +'</a>'
    +'<span class="sticky-arrow r">&#9668;&#9668;</span>';
</script>
</body>
</html>
