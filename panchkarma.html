      padding:10px 14px;display:flex;align-items:center;justify-content:center;gap:10px;

    @keyframes arr-blink-r{from{opacity:.3;transform:translateX(0)}to{opacity:1;transform:translateX(5px)}}

      background:linear-gradient(135deg,#d47600 0%,#ff8c00 50%,#d47600 100%);
      color:#fff;font-family:'Montserrat',sans-serif;
      font-size:clamp(16px,4.5vw,21px);font-weight:900;
      text-decoration:none;padding:14px 20px;border-radius:12px;
      text-transform:uppercase;letter-spacing:.5px;
      box-shadow:0 4px 20px rgba(255,140,0,.5);
      animation:sticky-pulse 1s ease-in-out infinite;
      overflow:hidden;position:relative;-webkit-tap-highlight-color:transparent;}
    @keyframes sticky-pulse{
      0%,100%{box-shadow:0 4px 20px rgba(255,140,0,.5);transform:scale(1)}
      50%    {box-shadow:0 6px 35px rgba(255,140,0,.8);transform:scale(1.03)}}

<script>
  /* Floating icons */
  var floaters=[
    {l:'5%',d:'11s',delay:'0s',e:'🌿'},{l:'18%',d:'14s',delay:'2s',e:'🧘'},
    {l:'33%',d:'9s',delay:'1s',e:'🪷'},{l:'50%',d:'13s',delay:'3.5s',e:'🌿'},
    {l:'68%',d:'10s',delay:'0.7s',e:'💆'},{l:'82%',d:'8s',delay:'2s',e:'🪷'},
    {l:'94%',d:'15s',delay:'4s',e:'🧘'},
  ];
  floaters.forEach(function(f){
    var el=document.createElement('div');el.className='floater';
    el.style.cssText='left:'+f.l+';animation-duration:'+f.d+';animation-delay:'+f.delay+';';
    el.textContent=f.e;document.body.appendChild(el);});

  function link(text,extraStyle){
    return '<a class="join-btn" href="'+CONFIG.whatsappLink+'" target="_blank" rel="noopener noreferrer"'
      +(extraStyle?' style="'+extraStyle+'"':'')+'>'+text+'</a>';}
  function joinWrap(btnText,wrapStyle){
    return '<div class="join-wrap"'+(wrapStyle?' style="'+wrapStyle+'"':'')+'>'
      +'<span class="side-arr l">&#9658;&#9658;</span>'+link(btnText)
      +'<span class="side-arr r">&#9668;&#9668;</span></div>';}
  function arrowsDown(large){
    var h='<div class="arrow-section"'+(large?'':' style="margin-bottom:6px"')+'>'
      +'<div class="arrow-row"><span class="arrow">&#9660;</span><span class="arrow">&#9660;</span><span class="arrow">&#9660;</span></div>';
    if(large)h+='<div class="arrow-row"><span class="arrow" style="font-size:44px">&#9660;</span>'
      +'<span class="arrow" style="font-size:44px;animation-delay:.15s">&#9660;</span></div>';
    return h+'</div>';}

  var chipsHTML=CONFIG.therapyChips.map(function(c){return '<span class="t-chip">'+c+'</span>';}).join('');
  var dTagsHTML=CONFIG.diseaseTags.map(function(d){return '<span class="d-tag">'+d+'</span>';}).join('');

  var hlHTML=CONFIG.highlights.map(function(h){
    return '<div class="highlight-item"><span class="h-icon">'+h.icon+'</span>'
      +'<div><div class="h-title">'+h.title+'</div>'
      +(h.sub?'<div class="h-sub">'+h.sub+'</div>':'')+'</div></div>';}).join('');

  var learnHTML=CONFIG.learnItems.map(function(i){
    return '<div class="learn-item"><span class="learn-check">✅</span><span>'+i+'</span></div>';}).join('');

  var featHTML=CONFIG.features.map(function(f){
    return '<div class="feat-box"><span class="f-icon">'+f.icon+'</span>'
      +'<span class="f-text">'+f.text+'</span></div>';}).join('');

  var bonusHTML=CONFIG.bonusItems.map(function(b){
    return '<div class="bonus-item"><span style="font-size:18px;flex-shrink:0;margin-top:2px;">'+b.icon+'</span>'
      +'<span>'+b.text+'</span></div>';}).join('');

  var trustHTML=CONFIG.trustBadges.map(function(b){
    return '<div class="trust-box"><span class="t-icon">'+b.icon+'</span>'
      +'<span class="t-text">'+b.text+'</span></div>';}).join('');

  document.title=CONFIG.pageTitle;

  document.getElementById('page-root').innerHTML=

    '<div class="top-badge">'+CONFIG.topBadge+'</div>'

    +arrowsDown(false)
    +joinWrap(CONFIG.btnText,'margin-bottom:18px')

    +'<div class="poster-wrap">'
    +'<img src="'+CONFIG.posterImage+'" alt="Panchkarma" onerror="this.parentElement.style.display=\'none\'" />'
    +'<div class="poster-ribbon">'+CONFIG.posterRibbon+'</div></div>'

    +'<div class="hero">'
    +'<div class="pre">'+CONFIG.heroPre+'</div>'
    +'<h1><span class="saffron">'+CONFIG.heroMain+'</span><br>'+CONFIG.heroSaffron+'</h1>'
    +'<div class="sub">'+CONFIG.heroSub+'</div></div>'

    +'<div class="free-banner">'+CONFIG.freeText+'</div>'

    +'<div class="divider"><div class="divider-line"></div>'
    +'<div class="divider-text">🧘 क्या सीखेंगे</div>'
    +'<div class="divider-line"></div></div>'
    +'<div class="therapy-chips">'+chipsHTML+'</div>'

    +'<div class="disease-section">'
    +'<div class="disease-title">'+CONFIG.diseaseTitle+'</div>'
    +'<div class="disease-tags">'+dTagsHTML+'</div>'
    +'<div class="disease-count">'+CONFIG.diseaseCount+'</div></div>'

    +'<div class="highlights">'+hlHTML+'</div>'

    +arrowsDown(true)
    +joinWrap(CONFIG.btnText)
    +'<p style="color:#7a6090;font-size:13px;text-align:center;margin-bottom:24px;">'+CONFIG.btnHint+'</p>'

    +'<div class="card"><div class="card-title">'+CONFIG.learnTitle+'</div>'+learnHTML+'</div>'

    +'<div class="divider"><div class="divider-line"></div>'
    +'<div class="divider-text">✨ आपको मिलेगा</div>'
    +'<div class="divider-line"></div></div>'
    +'<div class="feat-grid">'+featHTML+'</div>'

    +'<div class="bonus-box"><div class="bonus-title">'+CONFIG.bonusTitle+'</div>'+bonusHTML+'</div>'

    +'<div class="urgency">'+CONFIG.urgencyText+'</div>'

    +'<div class="arrow-section" style="margin-bottom:8px"><div class="arrow-row">'
    +'<span class="arrow" style="font-size:30px">&#9650;</span>'
    +'<span class="arrow" style="font-size:30px;animation-delay:.1s">&#9650;</span>'
    +'<span class="arrow" style="font-size:30px;animation-delay:.2s">&#9650;</span>'
    +'</div></div>'
    +link(CONFIG.btnText,'margin-bottom:28px;')

    +'<div class="trust-grid">'+trustHTML+'</div>'

    +'<div class="footer">'+CONFIG.footerLine1+'<br>'+CONFIG.footerLine2+'</div>';

  document.getElementById('sticky-bar').innerHTML=
    '<span class="sticky-arrow">&#9658;&#9658;</span>'
    +'<a class="sticky-btn" href="'+CONFIG.whatsappLink+'" target="_blank" rel="noopener noreferrer">'
    +CONFIG.btnText+'</a>'
    +'<span class="sticky-arrow r">&#9668;&#9668;</span>';
</script>
</body>
</html>
