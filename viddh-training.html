        +'<span class="arrow" style="font-size:44px;animation-delay:.15s">&#9660;</span>'
        +'</div>';
    }
    return html + '</div>';
  }

  var highlightsHTML = CONFIG.highlights.map(function(h) {
    return '<div class="highlight-item">'
      +'<span class="h-icon">'+h.icon+'</span>'
      +'<div class="h-content">'
      +'<div class="h-title">'+h.title+'</div>'
      +(h.sub ? '<div class="h-sub">'+h.sub+'</div>' : '')
      +'</div></div>';
  }).join('');

  var learnHTML = CONFIG.learnItems.map(function(item) {
    return '<div class="learn-item"><span class="learn-check">✅</span><span>'+item+'</span></div>';
  }).join('');

  var featuresHTML = CONFIG.features.map(function(f) {
    return '<div class="feat-box">'
      +'<span class="f-icon">'+f.icon+'</span>'
      +'<span class="f-text">'+f.text+'</span>'
      +'</div>';
  }).join('');

  var bonusHTML = CONFIG.bonusItems.map(function(b) {
    return '<div class="bonus-item">'
      +'<span style="font-size:18px;flex-shrink:0;margin-top:2px;">'+b.icon+'</span>'
      +'<span>'+b.text+'</span>'
      +'</div>';
  }).join('');

  var trustHTML = CONFIG.trustBadges.map(function(b) {
    return '<div class="trust-box">'
      +'<span class="t-icon">'+b.icon+'</span>'
      +'<span class="t-text">'+b.text+'</span>'
      +'</div>';
  }).join('');

  document.title = CONFIG.pageTitle;

  document.getElementById('page-root').innerHTML =

    /* top badge */
    '<div class="top-badge">'+CONFIG.topBadge+'</div>'

    /* first CTA */
    + arrowsDown(false)
    + joinWrap(CONFIG.btnText, 'margin-bottom:18px')

    /* poster */
    + '<div class="poster-wrap">'
    + '<img src="'+CONFIG.posterImage+'" alt="Viddh Training" onerror="this.parentElement.style.display=\'none\'" />'
    + '<div class="poster-ribbon">'+CONFIG.posterRibbon+'</div>'
    + '</div>'

    /* hero headline */
    + '<div class="hero">'
    + '<h1>'+CONFIG.headlineLine1+'<br><span class="red">'+CONFIG.headlineRed+'</span><br>'+CONFIG.headlineLine2+'</h1>'
    + '<div class="sub">'+CONFIG.headlineSub+'</div>'
    + '</div>'

    /* free webinar banner */
    + '<div class="free-banner">'+CONFIG.freeWebinarText+'</div>'

    /* key highlights */
    + '<div class="highlights">'+highlightsHTML+'</div>'

    /* what you learn */
    + '<div class="card">'
    + '<div class="card-title">'+CONFIG.learnTitle+'</div>'
    + learnHTML
    + '</div>'

    /* arrows + second CTA */
    + arrowsDown(true)
    + joinWrap(CONFIG.btnText)
    + '<p style="color:#888;font-size:13px;text-align:center;margin-bottom:24px;">'+CONFIG.btnHint+'</p>'

    /* features grid */
    + '<div class="divider">'
    + '<div class="divider-line"></div>'
    + '<div class="divider-text">✨ आपको मिलेगा</div>'
    + '<div class="divider-line"></div>'
    + '</div>'
    + '<div class="feat-grid">'+featuresHTML+'</div>'

    /* bonus */
    + '<div class="bonus-box">'
    + '<div class="bonus-title">'+CONFIG.bonusTitle+'</div>'
    + bonusHTML
    + '</div>'

    /* urgency */
    + '<div class="urgency">'+CONFIG.urgencyText+'</div>'

    /* final CTA */
    + '<div class="arrow-section" style="margin-bottom:8px">'
    + '<div class="arrow-row">'
    + '<span class="arrow" style="font-size:30px">&#9650;</span>'
    + '<span class="arrow" style="font-size:30px;animation-delay:.1s">&#9650;</span>'
    + '<span class="arrow" style="font-size:30px;animation-delay:.2s">&#9650;</span>'
    + '</div></div>'
    + link(CONFIG.btnText, 'margin-bottom:28px;')

    /* trust badges */
    + '<div class="trust-grid">'+trustHTML+'</div>'

    /* footer */
    + '<div class="footer">'+CONFIG.footerLine1+'<br>'+CONFIG.footerLine2+'</div>';

  /* sticky bar */
  document.getElementById('sticky-bar').innerHTML =
    '<span class="sticky-arrow">&#9658;&#9658;</span>'
    +'<a class="sticky-btn" href="'+CONFIG.whatsappLink+'" target="_blank" rel="noopener noreferrer">'
    +CONFIG.btnText
    +'</a>'
    +'<span class="sticky-arrow r">&#9668;&#9668;</span>';
</script>
</body>
</html>
